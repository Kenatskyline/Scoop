<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCOOP</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 6px 22px rgba(0,0,0,.08);
}

img{
max-width:100%;
margin-bottom:30px;
}

input, select, textarea{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ddd;
border-radius:10px;
}

textarea{
resize:vertical;
min-height:80px;
}

button{
background:#1e2f44;
color:white;
border:none;
padding:15px;
font-size:18px;
width:100%;
cursor:pointer;
border-radius:10px;
}

button:hover{
opacity:.9;
}

.small-note{
color:#666;
font-size:13px;
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<img src="scoop-logo.PNG" alt="SCOOP Logo">

<h2>Cleanup Questionnaire</h2>

<form id="form" autocomplete="on">

<input type="text" id="clientName" placeholder="Client Name" autocomplete="name" required>

<input type="text" id="streetAddress" placeholder="Street Address" autocomplete="street-address" required>

<input type="text" id="town" placeholder="Town / City" autocomplete="address-level2" required>

<input type="text" id="zip" placeholder="ZIP Code" autocomplete="postal-code" required>

<input type="tel" id="phone" placeholder="Phone Number" autocomplete="tel" required>

<input type="email" id="email" placeholder="Email Address" autocomplete="email" required>

<input type="number" id="dogs" placeholder="How many dogs?" min="1" required>

<div id="dogNames"></div>

<textarea id="allergies" placeholder="Dog Allergies or Treat Restrictions (optional)"></textarea>

<select id="frequency" required>
<option value="Weekly">Weekly</option>
<option value="2x per week">2x per week</option>
<option value="Bi-weekly">Bi-weekly</option>
<option value="One time cleanup">One time cleanup</option>
</select>

<button type="submit">Submit</button>

<div class="small-note">
Submitting opens your email with the request pre-filled.
</div>

</form>

</div>

<script>

const dogInput=document.getElementById("dogs")
const dogNamesDiv=document.getElementById("dogNames")

function renderDogNameFields(){

dogNamesDiv.innerHTML=""

let count=parseInt(dogInput.value)

if(!count || count<=0)return

for(let i=1;i<=count;i++){

let input=document.createElement("input")
input.type="text"
input.placeholder="Dog "+i+" Name"
input.className="dogName"
input.required=true

dogNamesDiv.appendChild(input)

}

}

dogInput.addEventListener("input",renderDogNameFields)


const phoneInput=document.getElementById("phone")

phoneInput.addEventListener("input",function(){

let digits=this.value.replace(/\D/g,'')

if(digits.length>10)digits=digits.slice(0,10)

let formatted=''

if(digits.length>0){
formatted='('+digits.substring(0,3)
}

if(digits.length>=4){
formatted=formatted+') '+digits.substring(3,6)
}

if(digits.length>=7){
formatted=formatted+'-'+digits.substring(6,10)
}

this.value=formatted

})


document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

let clientName=document.getElementById("clientName").value
let streetAddress=document.getElementById("streetAddress").value
let town=document.getElementById("town").value
let zip=document.getElementById("zip").value
let phone=document.getElementById("phone").value
let email=document.getElementById("email").value
let dogs=document.getElementById("dogs").value
let frequency=document.getElementById("frequency").value
let allergies=document.getElementById("allergies").value

let dogNames=[]

document.querySelectorAll(".dogName").forEach(function(el){
dogNames.push(el.value)
})

let subject="SCOOP Cleanup Request"

let body=
"Client Name: "+clientName+"%0D%0A"+
"Street Address: "+streetAddress+"%0D%0A"+
"Town: "+town+"%0D%0A"+
"ZIP Code: "+zip+"%0D%0A"+
"Phone: "+phone+"%0D%0A"+
"Email: "+email+"%0D%0A"+
"Dogs: "+dogs+"%0D%0A"+
"Dog Names: "+dogNames.join(", ")+"%0D%0A"+
"Allergies / Treat Restrictions: "+allergies+"%0D%0A"+
"Frequency: "+frequency

window.location.href=
"mailto:sammus422@gmail.com?subject="+subject+"&body="+body

})

</script>

</body>
</html>
