<!DOCTYPE html>
<html>
<head>
<title>SCOOP</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
}

img{
max-width:100%;
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
background:#1e2f44;
color:white;
border:none;
padding:15px;
font-size:18px;
width:100%;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<img src="scoop-logo.PNG">

<h2>Cleanup Questionnaire</h2>

<form id="form">

<input type="text" id="clientName" placeholder="Your Name" required>

<input type="text" id="address" placeholder="Address" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="number" id="dogs" placeholder="How many dogs?" required>

<div id="dogNames"></div>

<select id="frequency">
<option>Weekly</option>
<option>2x per week</option>
<option>Bi-weekly</option>
<option>One time cleanup</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<script>

const dogInput = document.getElementById("dogs")
const dogNamesDiv = document.getElementById("dogNames")

dogInput.addEventListener("input", function(){

dogNamesDiv.innerHTML = ""

let count = parseInt(dogInput.value)

for(let i=1;i<=count;i++){

let input = document.createElement("input")
input.type="text"
input.placeholder="Dog "+i+" Name"
input.className="dogName"

dogNamesDiv.appendChild(input)

}

})

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

let clientName=document.getElementById("clientName").value
let address=document.getElementById("address").value
let phone=document.getElementById("phone").value
let email=document.getElementById("email").value
let dogs=document.getElementById("dogs").value
let frequency=document.getElementById("frequency").value

let dogNames=[]
document.querySelectorAll(".dogName").forEach(function(el){
dogNames.push(el.value)
})

let subject="SCOOP Cleanup Request"

let body=
"Client Name: "+clientName+"%0D%0A"+
"Address: "+address+"%0D%0A"+
"Phone: "+phone+"%0D%0A"+
"Email: "+email+"%0D%0A"+
"Dogs: "+dogs+"%0D%0A"+
"Dog Names: "+dogNames.join(", ")+"%0D%0A"+
"Frequency: "+frequency

window.location.href=
"mailto:sammus422@gmail.com?subject="+subject+"&body="+body

})

</script>

</body>
</html>
