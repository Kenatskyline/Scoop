<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCOOP</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 6px 22px rgba(0,0,0,.08);
}

img{
max-width:100%;
margin-bottom:30px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
background:#1e2f44;
color:white;
border:none;
padding:15px;
font-size:18px;
width:100%;
cursor:pointer;
border-radius:10px;
}

button:hover{
opacity:.9;
}

.section-title{
margin-top:25px;
font-weight:bold;
color:#1e2f44;
text-align:left;
}

.row{
display:flex;
gap:10px;
}

.row>*{
flex:1;
}

</style>

</head>

<body>

<div class="container">

<img src="scoop-logo.PNG">

<h2>DogWaste Removal Inquiry</h2>

<form action="https://formspree.io/f/xpqyazkn" method="POST">

<input type="hidden" name="_redirect" value="https://kenatskyline.github.io/Scoop/success.html">

<div class="section-title">Customer Info</div>

<div class="row">

<input
type="text"
name="First Name"
placeholder="First Name"
autocomplete="given-name"
required>

<input
type="text"
name="Last Name"
placeholder="Last Name"
autocomplete="family-name"
required>

</div>

<input
type="text"
name="Street Address"
placeholder="Street Address"
autocomplete="street-address"
required>

<div class="row">

<input
type="text"
name="Town"
placeholder="Town / City"
autocomplete="address-level2"
required>

<input
type="text"
name="ZIP"
placeholder="ZIP Code"
autocomplete="postal-code"
inputmode="numeric"
maxlength="10"
required>

</div>

<input
type="tel"
id="phone"
name="Phone"
placeholder="Phone Number"
autocomplete="tel"
required>

<input
type="email"
name="Email"
placeholder="Email Address"
autocomplete="email"
required>

<div class="section-title">Dogs</div>

<input
type="number"
id="dogs"
name="Number of Dogs"
placeholder="How many dogs?"
min="1"
required>

<div id="dogNames"></div>

<textarea
name="Dog Allergies"
placeholder="Dog allergies or treat restrictions (optional)">
</textarea>

<div class="section-title">Service Details</div>

<select name="Service Frequency" required>

<option value="">Service Frequency</option>

<option>2x per week</option>
<option>Weekly</option>
<option>Bi-weekly</option>
<option>One time cleanup</option>
<option>Winter Thaw</option>

</select>

<select name="Service Type" required>

<option value="">Service Type</option>

<option>Frontyard Service</option>
<option>Backyard Service</option>
<option>Both</option>

</select>

<select name="Dog Behavior" required>

<option value="">Dog Behavior</option>

<option>Dog is friendly</option>
<option>Dog is aggressive</option>
<option>Dog is vocal</option>

</select>

<select name="Gate Type">

<option value="">Gate Type </option>

<option>Unlocked Gate</option>
<option>Latch Gate</option>
<option>Combination Lock</option>
<option>Keypad Lock</option>
<option>No Gate</option>

</select>

<textarea
name="Comments"
placeholder="Comments (gate code, dog schedule, etc)">
</textarea>

<button type="submit">Submit</button>

</form>

</div>

<script>

// dog name generator

const dogInput=document.getElementById("dogs")
const dogNamesDiv=document.getElementById("dogNames")

dogInput.addEventListener("input",function(){

dogNamesDiv.innerHTML=""

let count=parseInt(dogInput.value)

if(!count||count<1)return

for(let i=1;i<=count;i++){

let input=document.createElement("input")

input.type="text"
input.placeholder="Dog "+i+" Name"
input.name="Dog "+i+" Name"
input.required=true

dogNamesDiv.appendChild(input)

}

})


// phone formatting

const phoneInput=document.getElementById("phone")

phoneInput.addEventListener("input",function(){

let digits=phoneInput.value.replace(/\D/g,'')

if(digits.length>10)digits=digits.slice(0,10)

if(digits.length<4){
phoneInput.value="("+digits
}

else if(digits.length<7){
phoneInput.value="("+digits.slice(0,3)+") "+digits.slice(3)
}

else{
phoneInput.value="("+digits.slice(0,3)+") "+digits.slice(3,6)+"-"+digits.slice(6)
}

})

</script>

</body>
</html>
