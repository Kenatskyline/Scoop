<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCOOP</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      text-align:center;
      padding:40px;
      margin:0;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:10px;
      max-width:600px;
      margin:auto;
      box-shadow: 0 6px 22px rgba(0,0,0,.08);
    }

    img{
      max-width:100%;
      height:auto;
      margin-bottom:30px;
    }

    input, select{
      width:100%;
      padding:12px;
      margin:10px 0;
      font-size:16px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    button{
      background:#1e2f44;
      color:white;
      border:none;
      padding:15px;
      font-size:18px;
      width:100%;
      cursor:pointer;
      border-radius: 10px;
      margin-top: 6px;
    }

    button:hover{
      opacity:.9;
    }

    .small-note{
      color:#666;
      font-size:13px;
      margin-top:6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- IMPORTANT: this matches your repo file name exactly -->
    <img src="scoop-logo.PNG" alt="SCOOP Logo" />

    <h2>Cleanup Questionnaire</h2>

    <form id="form">
      <input type="text" id="clientName" placeholder="Client Name" required />
      <input type="text" id="address" placeholder="Address" required />
      <input type="tel" id="phone" placeholder="Phone Number" required />
      <input type="email" id="email" placeholder="Email Address" required />

      <input type="number" id="dogs" placeholder="How many dogs?" min="1" step="1" required />

      <!-- Dog name fields will be generated here -->
      <div id="dogNames"></div>

      <select id="frequency" required>
        <option value="Weekly">Weekly</option>
        <option value="2x per week">2x per week</option>
        <option value="Bi-weekly">Bi-weekly</option>
        <option value="One time cleanup">One time cleanup</option>
      </select>

      <button type="submit">Submit</button>
      <div class="small-note">Submitting opens your email app with the message pre-filled.</div>
    </form>
  </div>

  <script>
    const dogInput = document.getElementById("dogs");
    const dogNamesDiv = document.getElementById("dogNames");

    function renderDogNameFields() {
      dogNamesDiv.innerHTML = "";

      const count = parseInt(dogInput.value, 10);
      if (!Number.isFinite(count) || count <= 0) return;

      for (let i = 1; i <= count; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = `Dog ${i} Name`;
        input.className = "dogName";
        input.required = true;
        dogNamesDiv.appendChild(input);
      }
    }

    dogInput.addEventListener("input", renderDogNameFields);

    document.getElementById("form").addEventListener("submit", function (e) {
      e.preventDefault();

      const clientName = document.getElementById("clientName").value.trim();
      const address = document.getElementById("address").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const dogs = document.getElementById("dogs").value.trim();
      const frequency = document.getElementById("frequency").value;

      const dogNames = Array.from(document.querySelectorAll(".dogName"))
        .map(el => el.value.trim())
        .filter(Boolean);

      const to = "sammus422@gmail.com";
      const subject = "SCOOP Cleanup Request";

      const bodyLines = [
        `Client Name: ${clientName}`,
        `Address: ${address}`,
        `Phone: ${phone}`,
        `Email: ${email}`,
        `Dogs: ${dogs}`,
        `Dog Names: ${dogNames.length ? dogNames.join(", ") : "N/A"}`,
        `Frequency: ${frequency}`
      ];

      const mailto =
        `mailto:${encodeURIComponent(to)}` +
        `?subject=${encodeURIComponent(subject)}` +
        `&body=${encodeURIComponent(bodyLines.join("\n"))}`;

      window.location.href = mailto;
    });
  </script>
</body>
</html>
