<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCOOP</title>

<style>
  body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:40px;
    margin:0;
  }

  .container{
    background:white;
    padding:30px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
    box-shadow:0 6px 22px rgba(0,0,0,.08);
  }

  img{
    max-width:100%;
    height:auto;
    margin-bottom:30px;
  }

  input, select, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
  }

  textarea{
    resize:vertical;
    min-height:100px;
  }

  button{
    background:#1e2f44;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    width:100%;
    cursor:pointer;
    border-radius:10px;
  }

  button:hover{ opacity:.9; }

  .small-note{
    color:#666;
    font-size:13px;
    margin-top:6px;
    line-height:1.35;
  }

  .section-title{
    margin-top:22px;
    font-weight:bold;
    color:#1e2f44;
    text-align:left;
  }

  .row{
    display:flex;
    gap:10px;
  }
  .row > *{ flex:1; }

  @media (max-width:520px){
    .row{ flex-direction:column; gap:0; }
  }
</style>
</head>

<body>
<div class="container">

  <img src="scoop-logo.PNG" alt="SCOOP Logo">

  <h2>DogWaste Removal Inquiry</h2>

  <form id="form" autocomplete="on">

    <div class="section-title">Customer Info</div>

    <div class="row">
      <input type="text" id="firstName" placeholder="First Name" autocomplete="given-name" required>
      <input type="text" id="lastName" placeholder="Last Name" autocomplete="family-name" required>
    </div>

    <input type="text" id="streetAddress" placeholder="Street Address" autocomplete="street-address" required>

    <div class="row">
      <input type="text" id="town" placeholder="Town / City" autocomplete="address-level2" required>
      <input
type="text"
id="zip"
placeholder="ZIP Code"
autocomplete="postal-code"
inputmode="numeric"
maxlength="10"
required>
    </div>

    <input type="tel" id="phone" placeholder="Phone Number" autocomplete="tel" inputmode="tel" required>

    <input type="email" id="email" placeholder="Email Address" autocomplete="email" required>


    <div class="section-title">Dogs</div>

    <input type="number" id="dogs" placeholder="How many dogs?" min="1" step="1" inputmode="numeric" required>

    <div id="dogNames"></div>

    <textarea id="allergies" placeholder="Dog Allergies or Treat Restrictions (optional)"></textarea>


    <div class="section-title">Service Details</div>

    <select id="frequency" required>
      <option value="">Cleanup Frequency</option>
      <option value="Weekly">Weekly</option>
      <option value="2x per week">2x per week</option>
      <option value="Bi-weekly">Bi-weekly</option>
      <option value="Winter Thaw">Winter Thaw</option>
      <option value="One time cleanup">One time cleanup</option>
    </select>

    <select id="serviceType" required>
      <option value="">Service Type</option>
      <option value="Frontyard Service">Frontyard Service</option>
      <option value="Backyard Service">Backyard Service</option>
      <option value="Both">Both</option>
    </select>

    <select id="dogBehavior" required>
      <option value="">Dog Behavior</option>
      <option value="Dog is friendly">Dog is friendly</option>
      <option value="Dog is aggressive">Dog is aggressive</option>
      <option value="Dog is vocal">Dog is vocal</option>
    </select>

    <select id="gateType">
      <option value="">Gate Type </option>
      <option value="Unlocked Gate">Unlocked Gate</option>
      <option value="Latch Gate">Latch Gate</option>
      <option value="Combination Lock">Combination Lock</option>
      <option value="Keypad Lock">Keypad Lock</option>
      <option value="No Gate">No Gate</option>
    </select>

    <textarea id="notes" placeholder="Comments (example: gate code, dog is outside at certain times)"></textarea>

    <button type="submit">Submit</button>

    <div class="small-note">
      Submitting opens your email app with the message pre-filled.
    </div>

  </form>
</div>

<script>
  // --- Dog name generator ---
  const dogInput = document.getElementById("dogs");
  const dogNamesDiv = document.getElementById("dogNames");

  function renderDogNames(){
    dogNamesDiv.innerHTML = "";
    const count = parseInt(dogInput.value, 10);
    if (!Number.isFinite(count) || count <= 0) return;

    for (let i = 1; i <= count; i++){
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = `Dog ${i} Name`;
      input.className = "dogName";
      input.required = true;
      input.autocomplete = "off";
      dogNamesDiv.appendChild(input);
    }
  }
  dogInput.addEventListener("input", renderDogNames);

  // --- Phone formatting (US) ---
  const phoneInput = document.getElementById("phone");

  function formatUSPhone(digits){
    const d = digits.slice(0,10);
    if (d.length === 0) return "";
    if (d.length < 4) return "(" + d;
    if (d.length < 7) return "(" + d.slice(0,3) + ") " + d.slice(3);
    return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6);
  }

  phoneInput.addEventListener("input", () => {
    const digits = phoneInput.value.replace(/\D/g, "");
    phoneInput.value = formatUSPhone(digits);
  });

  // --- Submit / mailto ---
  document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName  = document.getElementById("lastName").value.trim();

    const streetAddress = document.getElementById("streetAddress").value.trim();
    const town = document.getElementById("town").value.trim();
    const zip = document.getElementById("zip").value.trim();

    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();

    const dogs = document.getElementById("dogs").value.trim();
    const allergies = document.getElementById("allergies").value.trim();

    const frequency = document.getElementById("frequency").value;
    const serviceType = document.getElementById("serviceType").value;
    const dogBehavior = document.getElementById("dogBehavior").value;

    const gateType = document.getElementById("gateType").value || "N/A";
    const notes = document.getElementById("notes").value.trim() || "N/A";

    const dogNames = Array.from(document.querySelectorAll(".dogName"))
      .map(el => el.value.trim())
      .filter(Boolean);

    const to = "sammus422@gmail.com";
    const subject = "DogWaste Removal Inquiry";

    const bodyLines = [
      `First Name: ${firstName}`,
      `Last Name: ${lastName}`,
      `Street Address: ${streetAddress}`,
      `Town / City: ${town}`,
      `ZIP Code: ${zip}`,
      `Phone: ${phone}`,
      `Email: ${email}`,
      `Dogs: ${dogs}`,
      `Dog Names: ${dogNames.length ? dogNames.join(", ") : "N/A"}`,
      `Allergies / Treat Restrictions: ${allergies || "N/A"}`,
      `Cleanup Frequency: ${frequency}`,
      `Service Type: ${serviceType}`,
      `Dog Behavior: ${dogBehavior}`,
      `Gate Type: ${gateType}`,
      `Comments: ${notes}`
    ];

    const mailto =
      `mailto:${encodeURIComponent(to)}` +
      `?subject=${encodeURIComponent(subject)}` +
      `&body=${encodeURIComponent(bodyLines.join("\n"))}`;

    window.location.href = mailto;
  });
</script>

</body>
</html>
